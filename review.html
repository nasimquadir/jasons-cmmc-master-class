<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Center</title>
  <link rel="stylesheet" href="css/style.css?v=12" />
</head>

<body>

<h1>Review Center</h1>

<div class="review-toolbar">
  <input id="reviewSearch" type="text" placeholder="Search ID, domain, difficulty, tag..." oninput="searchReview()" />

  <button onclick="showAllReviews()">All Questions</button>
  <button onclick="showMissedOnly()">Missed Only</button>
  <button onclick="showFlaggedOnly()">Flagged Only</button>
  <button onclick="previousReview()">← Previous</button>
  <button onclick="nextReview()">Next →</button>

  <a href="results.html"><button>Return Results</button></a>
  <a href="index.html"><button>Main Menu</button></a>
</div>

<h3 id="reviewCounter"></h3>

<div id="reviewContainer"></div>

<script src="js/review.js"></script>

</body>
</html>
