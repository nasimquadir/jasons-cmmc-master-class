<!DOCTYPE html>
<html>
<head>
  <title>Study Bank</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Adaptive Study Bank</h1>

<h3 id="questionCount">Loading question count...</h3>
<h3 id="modeIndicator">Mode: Not started</h3>

<div class="dashboard-card">
  <h2>Select Quiz Size</h2>

  <button onclick="startStudy(10)">10 Questions</button>
  <button onclick="startStudy(25)">25 Questions</button>
  <button onclick="startStudy(50)">50 Questions</button>
  <button onclick="startStudy(100)">100 Questions</button>

  <hr>

  <h2>Mode</h2>

  <label><input type="radio" name="mode" value="random" checked> Random</label><br>
  <label><input type="radio" name="mode" value="missed"> Missed Questions Only</label><br>
  <label><input type="radio" name="mode" value="weak"> Weak Domains Only</label><br>
  <label><input type="radio" name="mode" value="adaptive"> Adaptive Learning</label>
</div>

<div id="studyLaunchArea">

  <h2 id="timer">03:30:00</h2>

  <div id="progressBarContainer">
    <div id="progressBar"></div>
  </div>

<div class="exam-layout">

  <div class="exam-main">

    <div id="questionContainer">
      Loading...
    </div>

    <br>

    <button onclick="previousQuestion()">Previous</button>
    <button onclick="nextQuestion()">Next</button>
    <button onclick="flagQuestion()">Flag Question</button>
    <button onclick="submitExam()">Submit Exam</button>
    <button onclick="resetExam()">Reset Exam</button>

  </div>

  <div id="questionNav"></div>

</div>

<br>

<a href="index.html"><button>Main Menu</button></a>

<script>
window.examType = "study";
</script>

<script src="js/adaptive.js"></script>
<script src="js/timer.js"></script>
<script src="js/app.js"></script>
<script src="js/scoring.js"></script>

</body>
</html>
