<!DOCTYPE html>
<html>
<head>
  <title>Build Study Bank</title>
</head>
<body>

<h1>Build Complete Study Bank</h1>

<p>Upload question_bank_template.csv and study_bank_template.csv.</p>

<input type="file" id="examCsv" accept=".csv">
<br><br>
<input type="file" id="studyCsv" accept=".csv">
<br><br>

<button onclick="buildStudyBank()">Build Study Bank</button>

<script>
function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"' && inQuotes && next === '"') {
      cell += '"';
      i++;
    } else if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === "," && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((char === "\n" || char === "\r") && !inQuotes) {
      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
        row = [];
        cell = "";
      }
      if (char === "\r" && next === "\n") i++;
    } else {
      cell += char;
    }
  }

  if (cell || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function csvEscape(value) {
  if (value === undefined || value === null) return '""';
  return `"${String(value).replace(/"/g, '""')}"`;
}

function rowsToCSV(rows) {
  return rows.map(row => row.map(csvEscape).join(",")).join("\n");
}

function download(filename, text) {
  const blob = new Blob([text], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

function rowToJson(row) {
  return {
    id: row[0],
    exam: row[1],
    domain: row[2],
    difficulty: row[3],
    question: row[4],
    choices: {
      A: row[5],
      B: row[6],
      C: row[7],
      D: row[8]
    },
    answer: row[9],
    explanation: row[10],
    reference: row[11],
    tags: row[12] ? row[12].split("|") : []
  };
}

async function readFile(fileInputId) {
  const file = document.getElementById(fileInputId).files[0];
  if (!file) throw new Error("Missing file: " + fileInputId);
  return await file.text();
}

async function buildStudyBank() {
  const examText = await readFile("examCsv");
  const studyText = await readFile("studyCsv");

  const examRows = parseCSV(examText);
  const studyRows = parseCSV(studyText);

  const header = examRows[0];

  const alphaRows = examRows.slice(1).filter(r => r[0].startsWith("ALPHA-"));
  const bravoRows = examRows.slice(1).filter(r => r[0].startsWith("BRAVO-"));

  const expertRows = studyRows.slice(1).filter(r => r[0].startsWith("SB-"));

  const finalRows = [header];

  alphaRows.forEach((row, index) => {
    const newRow = [...row];
    newRow[0] = `SB-${String(index + 1).padStart(3, "0")}`;
    newRow[1] = "Study";
    finalRows.push(newRow);
  });

  bravoRows.forEach((row, index) => {
    const newRow = [...row];
    newRow[0] = `SB-${String(index + 171).padStart(3, "0")}`;
    newRow[1] = "Study";
    finalRows.push(newRow);
  });

  expertRows.forEach(row => {
    finalRows.push(row);
  });

  const csvOutput = rowsToCSV(finalRows);
  const jsonOutput = JSON.stringify(finalRows.slice(1).map(rowToJson), null, 2);

  download("complete_study_bank_template.csv", csvOutput);
  download("study_bank.json", jsonOutput);

  alert(`Done. Built ${finalRows.length - 1} study bank questions.`);
}
</script>

</body>
</html>
